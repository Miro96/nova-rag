name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Verify version matches tag
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import re, pathlib; m=re.search(r'Version: (.+)', pathlib.Path('dist').glob('*.tar.gz').__next__().__str__()); print('n/a')" 2>/dev/null || true)
          # Read version from the freshly built wheel filename.
          WHEEL=$(ls dist/nova_rag-*.whl | head -n1)
          WHEEL_VERSION=$(python -c "import re, sys; print(re.search(r'nova_rag-([^-]+)-', sys.argv[1]).group(1))" "$WHEEL")
          echo "Tag version:   $TAG_VERSION"
          echo "Wheel version: $WHEEL_VERSION"
          if [ "$TAG_VERSION" != "$WHEEL_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match built wheel ($WHEEL_VERSION). Refusing to publish."
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
