name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  publish:
    needs: test
    runs-on: ubuntu-latest

    # Trusted Publishing via OIDC — no long-lived PyPI API token in
    # repository secrets. Configure the trusted publisher in the PyPI
    # project settings (one-time): owner=Miro96, repo=nova-rag,
    # workflow=publish.yml, environment=pypi.
    environment:
      name: pypi
      url: https://pypi.org/p/nova-rag
    permissions:
      id-token: write  # required for OIDC token minting
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Verify wheel version matches tag
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          WHEEL=$(ls dist/nova_rag-*.whl | head -n1)
          WHEEL_VERSION=$(python -c "import re, sys; print(re.search(r'nova_rag-([^-]+)-', sys.argv[1]).group(1))" "$WHEEL")
          echo "Tag version:   $TAG_VERSION"
          echo "Wheel version: $WHEEL_VERSION"
          if [ "$TAG_VERSION" != "$WHEEL_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match built wheel ($WHEEL_VERSION). Refusing to publish."
            exit 1
          fi

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password: Trusted Publishing mints a short-lived token
        # from the GitHub OIDC identity of this workflow run.
